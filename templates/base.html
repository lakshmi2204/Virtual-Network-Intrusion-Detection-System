<!DOCTYPE html>
<html>
<head>
<title>NIDS Dashboard</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* GLOBAL */
body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:#020617;
    color:#e2e8f0;
}

/* CYBER GRID */
body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:
    linear-gradient(rgba(34,197,94,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(34,197,94,0.06) 1px, transparent 1px);
    background-size:40px 40px;
    z-index:-1;
}

/* SIDEBAR */
.sidebar{
    width:240px;
    height:100vh;
    position:fixed;
    background:#020617;
    border-right:1px solid #1e293b;
    padding:20px;
}

.sidebar h2{
    text-align:center;
    color:#22c55e;
}

.sidebar a{
    display:flex;
    gap:10px;
    padding:12px;
    margin:10px 0;
    color:#94a3b8;
    text-decoration:none;
    border-radius:8px;
}

.sidebar a:hover{
    background:#1e293b;
    color:#22c55e;
}

/* MAIN */
.main{
    margin-left:240px;
    padding:25px;
}

/* NAVBAR */
.navbar{
    background:linear-gradient(90deg,#22c55e,#06b6d4);
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
    color:black;
    font-weight:bold;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

/* CARD */
.card{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
}

/* TABLE */
table{width:100%;}
th,td{padding:10px;border-bottom:1px solid #334155;}

/* SEVERITY */
.low{color:#22c55e;}
.medium{color:#facc15;}
.high{color:#fb923c;}
.critical{color:#ef4444;font-weight:bold;}

/* ALERT */
.alert{
    background:#7f1d1d;
    padding:10px;
    margin:5px 0;
    border-radius:6px;
}

/* TERMINAL */
#terminal{
    background:#000;
    color:#00ff9c;
    font-family:monospace;
    height:220px;
    overflow-y:auto;
    padding:15px;
    border-radius:10px;
}

.cursor{
    display:inline-block;
    width:8px;
    background:#00ff9c;
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{opacity:0;}
}

*{box-sizing:border-box;}

</style>
</head>

<body>

<div class="sidebar">
<h2>NIDS</h2>
<a href="/dashboard"><i class="fa fa-home"></i> Dashboard</a>
<a href="/about"><i class="fa fa-info-circle"></i> About</a>
<a href="/contact"><i class="fa fa-envelope"></i> Contact</a>
</div>

<div class="main">
<div class="navbar">Cybersecurity Monitoring System</div>
{% block content %}{% endblock %}
</div>

</body>
</html>
